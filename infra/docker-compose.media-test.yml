services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: crownfi-media-test
      MINIO_ROOT_PASSWORD: crownfi-media-test-only-password
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - crownfi_minio:/data

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >-
        until mc alias set local http://minio:9000 crownfi-media-test crownfi-media-test-only-password;
        do sleep 1; done;
        mc mb --ignore-existing local/crownfi-media-test
    restart: "no"

  api:
    environment:
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: crownfi-media-test
      R2_SECRET_ACCESS_KEY: crownfi-media-test-only-password
      R2_BUCKET: crownfi-media-test
      R2_PUBLIC_BASE_URL: http://127.0.0.1:9000/crownfi-media-test
      R2_UPLOAD_TTL_SECONDS: "300"
      R2_MAX_IMAGE_BYTES: "1048576"
    depends_on:
      minio-init:
        condition: service_completed_successfully

volumes:
  crownfi_minio:
