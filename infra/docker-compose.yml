name: crownfi-platform

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set in infra/.env}
      POSTGRES_USER: ${POSTGRES_USER:?set in infra/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in infra/.env}
    volumes:
      - crownfi_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    environment:
      CROWNFI_API_BIND: 0.0.0.0:8080
      CROWNFI_API_MODE: ${CROWNFI_API_MODE:-local}
      STELLAR_MODE: ${STELLAR_MODE:-mock}
      STELLAR_PLATFORM_SECRET: ${STELLAR_PLATFORM_SECRET:-}
      AUDIT_ANCHOR_CONTRACT_ID: ${AUDIT_ANCHOR_CONTRACT_ID:-}
      TICKET_CONTRACT_ID: ${TICKET_CONTRACT_ID:-}
      COLLECTIBLE_CONTRACT_ID: ${COLLECTIBLE_CONTRACT_ID:-}
      SALE_SPLITTER_CONTRACT_ID: ${SALE_SPLITTER_CONTRACT_ID:-}
      USDC_TEST_CONTRACT_ID: ${USDC_TEST_CONTRACT_ID:-}
      DEMO_CONTESTANT_PAYOUT: ${DEMO_CONTESTANT_PAYOUT:-}
      EVENT_TREASURY_PAYOUT: ${EVENT_TREASURY_PAYOUT:-}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-init:
    build:
      context: ..
      dockerfile: web/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    command: ["sh", "-c", "npx prisma db push && npm run seed"]
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CROWNFI_API_URL: http://api:8080
      NEXT_PUBLIC_CROWNFI_API_URL: http://localhost:8080
      STELLAR_MODE: ${STELLAR_MODE:-mock}
      WALLET_PROVIDER: ${WALLET_PROVIDER:-mock}
      STELLAR_PLATFORM_SECRET: ${STELLAR_PLATFORM_SECRET:-}
      AUDIT_ANCHOR_CONTRACT_ID: ${AUDIT_ANCHOR_CONTRACT_ID:-}
      TICKET_CONTRACT_ID: ${TICKET_CONTRACT_ID:-}
      COLLECTIBLE_CONTRACT_ID: ${COLLECTIBLE_CONTRACT_ID:-}
      SALE_SPLITTER_CONTRACT_ID: ${SALE_SPLITTER_CONTRACT_ID:-}
      USDC_TEST_CONTRACT_ID: ${USDC_TEST_CONTRACT_ID:-}
      DEMO_CONTESTANT_PAYOUT: ${DEMO_CONTESTANT_PAYOUT:-}
      EVENT_TREASURY_PAYOUT: ${EVENT_TREASURY_PAYOUT:-}
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_STELLAR_NETWORK_PASSPHRASE: Test SDF Network ; September 2015
      ADMIN_WALLETS: ""
      NEXT_PUBLIC_ADMIN_WALLETS: ""
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:?set a long random value in infra/.env}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  crownfi_postgres:
