name: Repair prediction market smoke transport

on:
  pull_request:
    branches:
      - integration/platform-v1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prediction-market branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || 'feat/prediction-market-foundation-v1' }}
          persist-credentials: true
      - name: Repair internal transport fixtures
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/acceptance/prediction-market-foundation-smoke.sh')
          text = path.read_text(encoding='utf-8')
          start = text.index('stake_body=')
          end = text.index('transaction_hash=', start)
          segment = text[start:end].replace(
              '--header "x-admin-demo-token: $admin_token"',
              '--header "x-crownfi-web-token: $web_token"',
          )
          text = text[:start] + segment + text[end:]
          text = text.replace(
              "printf '%s\n' \"$missing_transport_status\" >\"$evidence_dir/missing-web-transport-status.txt\"",
              "printf '%s\\n' \"$missing_transport_status\" >\"$evidence_dir/missing-web-transport-status.txt\"",
          )
          text = text.replace(
              "printf '%s\n' \"$foreign_intent_status\" >\"$evidence_dir/foreign-intent-read-status.txt\"",
              "printf '%s\\n' \"$foreign_intent_status\" >\"$evidence_dir/foreign-intent-read-status.txt\"",
          )
          path.write_text(text, encoding='utf-8')
          PY
      - name: Validate smoke script syntax
        run: bash -n scripts/acceptance/prediction-market-foundation-smoke.sh
      - name: Commit smoke repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/acceptance/prediction-market-foundation-smoke.sh
          if git diff --cached --quiet; then
            echo "Prediction-market smoke transport is already repaired."
            exit 0
          fi
          git commit -m "test(markets): use web transport for protected smoke routes"
          git push origin HEAD:${{ github.head_ref || 'feat/prediction-market-foundation-v1' }}
