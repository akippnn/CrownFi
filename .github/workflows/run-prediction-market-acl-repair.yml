name: Build prediction market ACL repair artifact

on:
  pull_request:
    branches:
      - integration/platform-v1
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repair-artifact:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prediction-market branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || 'feat/prediction-market-foundation-v1' }}
          persist-credentials: false
      - name: Extract and run the temporary repair program
        id: repair
        continue-on-error: true
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          workflow = Path('.github/workflows/repair-prediction-market-acl.yml').read_text(encoding='utf-8')
          marker = "          python3 - <<'PY'\n"
          start = workflow.index(marker) + len(marker)
          end = workflow.index("\n          PY\n", start)
          raw_lines = workflow[start:end].splitlines()
          lines = []
          in_triple_string = False
          for raw_line in raw_lines:
              line = raw_line
              if not in_triple_string and line.startswith('          '):
                  line = line[10:]
              lines.append(line)
              if line.count('"""') % 2 == 1:
                  in_triple_string = not in_triple_string
          program = '\n'.join(lines) + '\n'
          program_path = Path('/tmp/repair_prediction_market_acl.py')
          program_path.write_text(program, encoding='utf-8')
          result = subprocess.run(
              ['python3', str(program_path)],
              stdout=subprocess.PIPE,
              stderr=subprocess.STDOUT,
              text=True,
          )
          Path('/tmp/repair-output.log').write_text(result.stdout, encoding='utf-8')
          print(result.stdout, end='')
          raise SystemExit(result.returncode)
          PY
      - name: Setup Rust stable
        if: steps.repair.outcome == 'success'
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format and test API
        if: steps.repair.outcome == 'success'
        working-directory: services/api
        run: |
          cargo fmt
          cargo test --locked
      - name: Validate smoke script syntax
        if: steps.repair.outcome == 'success'
        run: bash -n scripts/acceptance/prediction-market-foundation-smoke.sh
      - name: Upload repaired sources and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-prediction-market-acl-repair
          path: |
            services/api/src/authorization_acl.rs
            services/api/src/markets.rs
            scripts/acceptance/prediction-market-foundation-smoke.sh
            docs/security/AUTHORIZATION.md
            /tmp/repair_prediction_market_acl.py
            /tmp/repair-output.log
          if-no-files-found: error
          retention-days: 1
      - name: Require repair success
        if: always()
        run: test "${{ steps.repair.outcome }}" = "success"
