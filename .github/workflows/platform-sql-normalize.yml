name: Normalize platform SQL strings

on:
  push:
    branches: [slice/organizer-pageants]
    paths:
      - services/api/src/platform.rs
      - .github/workflows/platform-sql-normalize.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: slice/organizer-pageants
      - name: Normalize continued SQL strings
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('services/api/src/platform.rs')
          text = path.read_text(encoding='utf-8')
          normalized = re.sub(r'\\\n\s*', ' ', text)
          if normalized == text:
              print('SQL strings are already normalized.')
          else:
              path.write_text(normalized, encoding='utf-8')
          PY
      - name: Format Rust sources
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
          cargo fmt --manifest-path services/api/Cargo.toml
      - name: Commit normalization
        run: |
          if git diff --quiet -- services/api/src/platform.rs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/api/src/platform.rs
          git commit -m "fix(platform): preserve SQL token spacing"
          git push origin HEAD:slice/organizer-pageants
