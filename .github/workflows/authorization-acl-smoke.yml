name: Authorization ACL smoke

on:
  pull_request:
    paths:
      - "services/api/**"
      - "web/**"
      - "infra/**"
      - "scripts/acceptance/authorization-acl-smoke.sh"
      - ".github/workflows/authorization-acl-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: authorization-acl-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  authorization-acl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Run centralized authorization matrix
        env:
          CROWNFI_AUTHZ_SMOKE_TIMEOUT_SECONDS: "1500"
        run: bash scripts/acceptance/authorization-acl-smoke.sh
      - name: Upload authorization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-authorization-acl-smoke
          path: .artifacts/acceptance/authorization-acl
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7
