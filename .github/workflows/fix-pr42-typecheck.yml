name: Fix PR 42 typecheck

on:
  push:
    branches:
      - feat/milestone-c-voting-v1
    paths:
      - .github/workflows/fix-pr42-typecheck.yml

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/milestone-c-voting-v1
          persist-credentials: true
      - name: Align receipt header with UI kit contract
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('web/src/app/vote/receipt/[receiptHash]/page.tsx')
          source = path.read_text(encoding='utf-8')
          old = '''      <SectionHeader
        eyebrow="Vote receipt verification"
        title="Immutable inclusion proof"
        description="This receipt is included in the closed round's deterministic Merkle tree. Anchored status is shown only when CrownFi has accepted matching AuditAnchor contract-event evidence."
        trailing={<StatusBadge status={proof.snapshot_status as "open" | "closed"} />}
      />'''
          new = '''      <div className="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <SectionHeader
          eyebrow="Vote receipt verification"
          title="Immutable inclusion proof"
          description="This receipt is included in the closed round's deterministic Merkle tree. Anchored status is shown only when CrownFi has accepted matching AuditAnchor contract-event evidence."
          className="mb-0"
        />
        <StatusBadge status={proof.snapshot_status as "open" | "closed"} />
      </div>'''
          if old not in source:
              raise SystemExit('receipt header marker not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
          git rm .github/workflows/fix-pr42-typecheck.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'web/src/app/vote/receipt/[receiptHash]/page.tsx'
          git commit -m 'fix(voting): align receipt header with UI kit contract'
          git push origin HEAD:feat/milestone-c-voting-v1
