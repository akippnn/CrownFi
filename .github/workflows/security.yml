name: Security checks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, Monday 02:00 Asia/Manila / Sunday 18:00 UTC.
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-hygiene:
    name: Dependency hygiene
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit npm dependencies
        run: npm run security:audit
      - name: Verify npm lockfile can install without scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

  web-security:
    name: Web app checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test Merkle receipts
        run: npm run test:merkle

  api-security:
    name: Rust API checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format API
        run: cargo fmt -- --check
      - name: Test API
        run: cargo test --locked

  api-database:
    name: SQLx migration checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crownfi
          POSTGRES_USER: crownfi
          POSTGRES_PASSWORD: crownfi-ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crownfi -d crownfi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://crownfi:crownfi-ci@127.0.0.1:5432/crownfi
      CROWNFI_DATABASE_REQUIRED: "true"
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Apply SQLx migrations
        run: cargo run --locked -- migrate
      - name: Prove migrations are repeatable
        run: cargo run --locked -- migrate
      - name: Verify canonical tables and empty platform data
        working-directory: .
        run: |
          set -euo pipefail
          container_id='${{ job.services.postgres.id }}'
          test -n "$container_id"
          docker exec "$container_id" psql -U crownfi -d crownfi -Atc \
            "SELECT to_regclass('public.organizations') IS NOT NULL;" | grep -qx t
          docker exec "$container_id" psql -U crownfi -d crownfi -Atc \
            "SELECT count(*) FROM users;" | grep -qx 0
          docker exec "$container_id" psql -U crownfi -d crownfi -Atc \
            "SELECT count(*) FROM organizations;" | grep -qx 0
          docker exec "$container_id" psql -U crownfi -d crownfi -Atc \
            "SELECT count(*) FROM pageants;" | grep -qx 0

  contracts-security:
    name: Soroban contracts audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Format workspace contracts
        run: cargo fmt --all -- --check
      - name: Format prediction market contract
        run: cargo fmt --manifest-path prediction-market/Cargo.toml -- --check
      - name: Test workspace contracts
        run: cargo test --workspace --locked
      - name: Test prediction market contract
        run: cargo test --manifest-path prediction-market/Cargo.toml --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit Rust dependencies for vulnerabilities
        run: |
          cargo audit
          cargo audit --file prediction-market/Cargo.lock
      - name: Report Rust advisory warnings
        continue-on-error: true
        run: |
          cargo audit --deny warnings
          cargo audit --file prediction-market/Cargo.lock --deny warnings

  secret-smoke-test:
    name: Secret smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Look for high-risk committed secrets
        run: python3 scripts/secret-smoke-test.py
