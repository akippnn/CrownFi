name: Security checks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, Monday 02:00 Asia/Manila / Sunday 18:00 UTC.
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-hygiene:
    name: Dependency hygiene
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Audit npm dependencies
        run: npm run security:audit
      - name: Verify npm lockfile can install without scripts
        run: npm ci --ignore-scripts --no-audit --no-fund

  web-security:
    name: Web app checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test Merkle receipts
        run: npm run test:merkle

  contracts-security:
    name: Soroban contracts audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Test contracts
        run: cargo test --workspace --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit Rust dependencies for vulnerabilities
        run: cargo audit
      - name: Report Rust advisory warnings
        continue-on-error: true
        run: cargo audit --deny warnings

  secret-smoke-test:
    name: Secret smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Look for high-risk committed secrets
        run: python3 scripts/secret-smoke-test.py
