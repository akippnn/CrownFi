name: Security checks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly, Monday 02:00 Asia/Manila / Sunday 18:00 UTC.
    - cron: "0 18 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0

  web-security:
    name: Web app audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test Merkle receipts
        run: npm run test:merkle
      - name: Audit npm dependencies
        run: npm run security:audit

  contracts-security:
    name: Soroban contracts audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Rust stable
        run: |
          rustup update stable
          rustup default stable
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Test contracts
        run: cargo test --workspace --locked
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

  secret-smoke-test:
    name: Secret smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Look for high-risk committed secrets
        run: |
          set -euo pipefail
          if git grep -n -I -E '(^|[^A-Z2-7])S[A-Z2-7]{55}([^A-Z2-7]|$)' -- \
            ':!contracts/DEPLOY_GUIDE.md' ':!web/.env.example'; then
            echo "Potential Stellar secret key committed." >&2
            exit 1
          fi
          if git grep -n -I -E 'postgresql://[^[:space:]]+:[^<][^@[:space:]]+@' -- \
            ':!SUPABASE.md' ':!web/.env.example'; then
            echo "Potential database URL with real password committed." >&2
            exit 1
          fi
