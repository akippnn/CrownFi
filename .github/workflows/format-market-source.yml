name: Auto-format market source

on:
  pull_request:
    paths:
      - "services/api/src/markets.rs"
      - ".github/workflows/format-market-source.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rustfmt:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          persist-credentials: true
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format API source
        working-directory: services/api
        run: cargo fmt
      - name: Commit formatting when needed
        run: |
          if git diff --quiet -- services/api/src/markets.rs; then
            echo "Market source is already formatted."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/api/src/markets.rs
          git commit -m "style(markets): apply rustfmt"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
