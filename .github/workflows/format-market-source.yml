name: Format market source artifact

on:
  pull_request:
    paths:
      - "services/api/src/markets.rs"
      - ".github/workflows/format-market-source.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rustfmt-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format API source
        working-directory: services/api
        run: cargo fmt
      - name: Upload formatted market source
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-formatted-market-source
          path: services/api/src/markets.rs
          retention-days: 1
