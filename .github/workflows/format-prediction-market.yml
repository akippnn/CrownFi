name: Format prediction market once

on:
  push:
    branches: [integration/finale-platform-rebuild]
    paths:
      - "contracts/prediction-market/**/*.rs"
      - ".github/workflows/format-prediction-market.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reconstruction branch
        uses: actions/checkout@v5
        with:
          ref: integration/finale-platform-rebuild
          persist-credentials: true
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format contract
        run: cargo fmt --manifest-path contracts/prediction-market/Cargo.toml
      - name: Commit formatter output
        run: |
          if git diff --quiet -- contracts/prediction-market; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contracts/prediction-market
          git commit -m "style(contracts): format prediction market"
          git push origin HEAD:integration/finale-platform-rebuild
