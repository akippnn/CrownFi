name: Commerce Rust checks

on:
  pull_request:
    paths:
      - "services/api/**"
      - ".github/workflows/commerce-rust-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: commerce-rust-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  commerce-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          show-progress: false
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format Rust sources
        run: cargo fmt --manifest-path services/api/Cargo.toml
      - name: Check formatting diff
        run: git diff --exit-code
      - name: Test Rust API
        run: cargo test --manifest-path services/api/Cargo.toml --locked
      - name: Upload formatted source and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-commerce-rust-diagnostics
          path: |
            services/api/src/commerce.rs
            services/api/src/main.rs
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7
