name: Commerce Rust checks

on:
  pull_request:
    paths:
      - "services/api/**"
      - ".github/workflows/commerce-rust-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: commerce-rust-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  commerce-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          show-progress: false
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check Rust formatting
        run: |
          mkdir -p .artifacts/commerce-rust
          set +e
          cargo fmt --manifest-path services/api/Cargo.toml -- --check >.artifacts/commerce-rust/fmt.txt 2>&1
          status=$?
          cat .artifacts/commerce-rust/fmt.txt
          exit "$status"
      - name: Test Rust API
        run: cargo test --manifest-path services/api/Cargo.toml --locked
      - name: Upload Rust diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-commerce-rust-diagnostics
          path: .artifacts/commerce-rust
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7
