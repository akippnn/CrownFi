name: Normalize platform Rust sources

on:
  push:
    branches: [slice/organizer-pageants]
    paths:
      - services/api/Cargo.toml
      - services/api/src/**
      - .github/workflows/platform-rustfmt.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: slice/organizer-pageants
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Normalize lockfile and Rust sources
        working-directory: services/api
        run: |
          cargo generate-lockfile
          cargo fmt
      - name: Commit normalized files
        run: |
          if git diff --quiet -- services/api/Cargo.lock services/api/src; then
            echo "Platform Rust sources are already normalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/api/Cargo.lock services/api/src
          git commit -m "chore(platform): normalize organizer API sources"
          git push origin HEAD:slice/organizer-pageants
