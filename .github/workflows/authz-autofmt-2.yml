name: One-shot authorization rustfmt 2

on:
  push:
    branches:
      - fix/authorization-acl-v1
    paths:
      - .github/workflows/authz-autofmt-2.yml

permissions:
  contents: write

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/authorization-acl-v1
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply rustfmt and commit
        run: |
          cargo fmt --manifest-path services/api/Cargo.toml
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add services/api/src/access.rs services/api/src/authorization_acl.rs services/api/src/main.rs
          git commit -m "style(authz): format access role updates"
          git push origin HEAD:fix/authorization-acl-v1
