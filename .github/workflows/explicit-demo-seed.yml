name: Explicit demo seed

on:
  pull_request:
    paths:
      - services/api/**
      - docs/development/demo-seed.md
      - .github/workflows/explicit-demo-seed.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: crownfi
          POSTGRES_USER: crownfi
          POSTGRES_PASSWORD: crownfi-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U crownfi -d crownfi"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://crownfi:crownfi-test@127.0.0.1:5432/crownfi
      CROWNFI_DATABASE_REQUIRED: "true"
      CROWNFI_API_MODE: local
      CROWNFI_ALLOW_DEMO_SEED: "true"
    steps:
      - uses: actions/checkout@v5
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format API
        run: cargo fmt --manifest-path services/api/Cargo.toml -- --check
      - name: Apply demo seed twice
        run: |
          cargo run --manifest-path services/api/Cargo.toml --locked -- seed demo
          cargo run --manifest-path services/api/Cargo.toml --locked -- seed demo
      - name: Verify deterministic records
        env:
          PGPASSWORD: crownfi-test
        run: |
          test "$(psql -h 127.0.0.1 -U crownfi -d crownfi -Atc "SELECT count(*) FROM organizations WHERE slug = 'crownfi-demo';")" = "1"
          test "$(psql -h 127.0.0.1 -U crownfi -d crownfi -Atc "SELECT count(*) FROM pageants WHERE slug = 'crownfi-international-2026';")" = "1"
          test "$(psql -h 127.0.0.1 -U crownfi -d crownfi -Atc "SELECT count(*) FROM pageant_contestants pc JOIN pageants p ON p.id = pc.pageant_id WHERE p.slug = 'crownfi-international-2026';")" = "3"
          test "$(psql -h 127.0.0.1 -U crownfi -d crownfi -Atc "SELECT count(*) FROM contestant_sections cs JOIN pageant_contestants pc ON pc.id = cs.pageant_contestant_id JOIN pageants p ON p.id = pc.pageant_id WHERE p.slug = 'crownfi-international-2026';")" = "12"
      - name: Prove production rejection
        run: |
          if CROWNFI_API_MODE=production cargo run --manifest-path services/api/Cargo.toml --locked -- seed demo; then
            echo "Production seed unexpectedly succeeded" >&2
            exit 1
          fi