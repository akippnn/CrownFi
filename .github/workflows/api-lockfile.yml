name: Normalize Rust API sources

on:
  push:
    branches: [foundation/database-v1]
    paths:
      - services/api/Cargo.toml
      - services/api/src/**
      - .github/workflows/api-lockfile.yml
  pull_request:
    paths:
      - services/api/Cargo.toml
      - services/api/src/**
      - .github/workflows/api-lockfile.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Generate API lockfile
        working-directory: services/api
        run: cargo generate-lockfile
      - name: Format API sources
        working-directory: services/api
        run: cargo fmt
      - name: Upload normalized API files
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-api-normalized
          path: |
            services/api/Cargo.lock
            services/api/src
          if-no-files-found: error
          retention-days: 1
      - name: Commit normalized API files on branch pushes
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- services/api/Cargo.lock services/api/src; then
            echo "Rust API files are already normalized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/api/Cargo.lock services/api/src
          git commit -m "chore(api): normalize SQLx foundation"
          git push origin "HEAD:${GITHUB_REF_NAME}"
