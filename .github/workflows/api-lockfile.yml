name: Generate Rust API lockfile

on:
  push:
    branches: [foundation/database-v1]
    paths:
      - services/api/Cargo.toml
      - .github/workflows/api-lockfile.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Generate API lockfile
        working-directory: services/api
        run: cargo generate-lockfile
      - name: Upload API lockfile
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-api-cargo-lock
          path: services/api/Cargo.lock
          if-no-files-found: error
          retention-days: 1
