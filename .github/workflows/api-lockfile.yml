name: Generate Rust API lockfile

on:
  push:
    branches: [foundation/database-v1]
    paths:
      - services/api/Cargo.toml
      - .github/workflows/api-lockfile.yml
  pull_request:
    paths:
      - services/api/Cargo.toml
      - .github/workflows/api-lockfile.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Generate API lockfile
        working-directory: services/api
        run: cargo generate-lockfile
      - name: Upload API lockfile
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-api-cargo-lock
          path: services/api/Cargo.lock
          if-no-files-found: error
          retention-days: 1
      - name: Commit generated lockfile on branch pushes
        if: github.event_name == 'push'
        run: |
          if git diff --quiet -- services/api/Cargo.lock; then
            echo "Cargo.lock is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/api/Cargo.lock
          git commit -m "chore(api): refresh SQLx lockfile"
          git push origin "HEAD:${GITHUB_REF_NAME}"
