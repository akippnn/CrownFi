name: Reconstruct PR 42 on current main

on:
  push:
    branches:
      - feat/milestone-c-voting-v1
    paths:
      - .github/workflows/reconstruct-pr42.yml

permissions:
  contents: write

jobs:
  reconstruct:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: feat/milestone-c-voting-v1
          fetch-depth: 0
          persist-credentials: true
      - name: Apply preserved PR 42 delta
        run: |
          set -euo pipefail
          git fetch origin archive/pr42-old-lineage-20260717
          git diff --binary ac810dac8ce4ff5418abc3c8a7ccb002d47d5f02 FETCH_HEAD > /tmp/pr42.patch
          test -s /tmp/pr42.patch
          git apply --3way --index /tmp/pr42.patch
          git rm .github/workflows/reconstruct-pr42.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'chore(pr42): reconstruct voting delta on current main'
          git push origin HEAD:feat/milestone-c-voting-v1
