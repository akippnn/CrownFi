name: Apply R2 compile fix

on:
  push:
    branches: [slice/r2-media]
    paths:
      - .github/workflows/r2-compile-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: slice/r2-media
      - name: Fix trim closures
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for name in ["services/api/src/storage.rs", "services/api/src/media.rs"]:
              path = Path(name)
              text = path.read_text(encoding="utf-8")
              text = text.replace(
                  ".map(str::trim_end_matches)",
                  ".map(|base| base.trim_end_matches('/'))",
              )
              path.write_text(text, encoding="utf-8")
          PY
      - name: Format and commit
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
          cargo fmt --manifest-path services/api/Cargo.toml
          if git diff --quiet -- services/api/src/storage.rs services/api/src/media.rs; then
            echo "Compile fix already applied."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add services/api/src/storage.rs services/api/src/media.rs
            git commit -m "fix(media): trim delivery URL with explicit closure"
            git push origin HEAD:slice/r2-media
          fi