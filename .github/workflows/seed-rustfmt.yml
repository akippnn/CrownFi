name: Normalize explicit seed sources

on:
  push:
    branches: [foundation/explicit-seed]
    paths:
      - services/api/src/main.rs
      - services/api/src/seed.rs
      - .github/workflows/seed-rustfmt.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v5
        with:
          ref: foundation/explicit-seed
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable
      - name: Format API sources
        working-directory: services/api
        run: cargo fmt
      - name: Commit normalized seed files
        run: |
          if git diff --quiet -- services/api/src/main.rs services/api/src/seed.rs; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add services/api/src/main.rs services/api/src/seed.rs
          git commit -m "chore(seed): normalize explicit seed sources"
          git push origin HEAD:foundation/explicit-seed
