name: Capture prediction market test failure once

on:
  push:
    branches: [integration/finale-platform-rebuild]
    paths:
      - "contracts/prediction-market/Cargo.toml"
      - "contracts/prediction-market/src/**"
      - ".github/workflows/capture-prediction-market-test.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout reconstruction branch
        uses: actions/checkout@v5
        with:
          ref: integration/finale-platform-rebuild
          persist-credentials: true
      - name: Setup Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Capture test output and lock resolution
        shell: bash
        run: |
          mkdir -p .ci
          set +e
          {
            cargo update \
              --manifest-path contracts/prediction-market/Cargo.toml \
              -p ed25519-dalek@3.0.0 \
              --precise 2.2.0
            cargo test \
              --manifest-path contracts/prediction-market/Cargo.toml \
              --locked
          } > .ci/prediction-market-test.log 2>&1
          status=$?
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contracts/prediction-market/Cargo.lock

          if [ "$status" -eq 0 ]; then
            rm -f .ci/prediction-market-test.log
            git add -u .ci || true
            message="build(contracts): lock prediction market dependencies"
          else
            printf '\nexit_status=%s\n' "$status" >> .ci/prediction-market-test.log
            git add .ci/prediction-market-test.log
            message="ci(contracts): capture prediction market test failure"
          fi

          if git diff --cached --quiet; then
            exit "$status"
          fi

          git commit -m "$message"
          git pull --rebase origin integration/finale-platform-rebuild
          git push origin HEAD:integration/finale-platform-rebuild
          exit "$status"
