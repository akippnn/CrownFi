name: One-shot align legacy smokes with ACL policy

on:
  push:
    branches:
      - fix/authorization-acl-v1
    paths:
      - .github/workflows/authz-fix-legacy-smokes.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: fix/authorization-acl-v1
      - name: Align smoke actors with reviewed platform capabilities
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f"expected snippet not found in {path}")
              file.write_text(text.replace(old, new, 1))

          replace(
              "scripts/acceptance/platform-persistence-smoke.sh",
              '''if [[ "$outsider_status" != "403" ]]; then
            echo "Expected outsider mutation to return 403, got $outsider_status" >&2''',
              '''if [[ "$outsider_status" != "404" ]]; then
            echo "Expected cross-tenant mutation to be concealed as 404, got $outsider_status" >&2''',
          )

          grant_site_owner = '''
          "${compose[@]}" exec -T postgres psql \\
            -U "${POSTGRES_USER:-crownfi}" \\
            -d "${POSTGRES_DB:-crownfi}" \\
            -v ON_ERROR_STOP=1 <<SQL
          INSERT INTO site_administrators (user_id, role, status, granted_by_user_id)
          VALUES ('$owner_id', 'owner', 'active', '$owner_id')
          ON CONFLICT (user_id) DO UPDATE SET role = EXCLUDED.role, status = EXCLUDED.status;
          SQL
          '''

          for path in [
              "scripts/acceptance/commerce-orders-smoke.sh",
              "scripts/acceptance/collectible-fulfillment-smoke.sh",
              "scripts/acceptance/stellar-chain-reconciliation-smoke.sh",
          ]:
              old = '''owner_id=$(json_field "$evidence_dir/bootstrap.json" user.id)
          organization_id=$(json_field "$evidence_dir/bootstrap.json" organization.id)
          '''
              new = old + grant_site_owner
              replace(path, old, new)
          PY
          rm .github/workflows/authz-fix-legacy-smokes.yml
      - name: Commit aligned acceptance fixtures
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/acceptance/platform-persistence-smoke.sh \
            scripts/acceptance/commerce-orders-smoke.sh \
            scripts/acceptance/collectible-fulfillment-smoke.sh \
            scripts/acceptance/stellar-chain-reconciliation-smoke.sh \
            .github/workflows/authz-fix-legacy-smokes.yml
          git commit -m "test(authz): align legacy smokes with reviewed ACL roles"
          git push origin HEAD:fix/authorization-acl-v1
