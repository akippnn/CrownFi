name: Platform persistence smoke

on:
  pull_request:
    branches: [foundation/database-v1]
    paths:
      - "services/api/**"
      - "infra/**"
      - "scripts/acceptance/platform-persistence-smoke.sh"
      - ".github/workflows/platform-persistence.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: platform-persistence-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  persistence-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Run persistent organizer and pageant flow
        env:
          CROWNFI_PLATFORM_SMOKE_TIMEOUT_SECONDS: "600"
        run: bash scripts/acceptance/platform-persistence-smoke.sh
      - name: Upload persistence evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crownfi-platform-persistence-smoke
          path: .artifacts/acceptance/platform-persistence
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7
