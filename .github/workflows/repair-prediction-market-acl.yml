name: Repair prediction market ACL adoption

on:
  push:
    branches:
      - feat/prediction-market-foundation-v1
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout prediction-market branch
        uses: actions/checkout@v5
        with:
          ref: feat/prediction-market-foundation-v1
          persist-credentials: true
      - name: Apply centralized market capability boundary
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f"missing expected source block: {label}")
              return text.replace(old, new, 1)

          auth_path = Path("services/api/src/authorization_acl.rs")
          auth = auth_path.read_text(encoding="utf-8")

          auth = replace_once(
              auth,
              "    PayoutRead,\n    SnapshotWrite,\n}",
              "    PayoutRead,\n    SnapshotWrite,\n    MarketCreate,\n    MarketSubmitReview,\n    MarketGovern,\n    MarketPolicyManage,\n    MarketStake,\n    MarketIntentRead,\n    MarketIntentWrite,\n}",
              "capability enum",
          )
          auth = replace_once(
              auth,
              '            Self::PayoutRead => "payout.read",\n            Self::SnapshotWrite => "voting.snapshot.write",',
              '            Self::PayoutRead => "payout.read",\n            Self::SnapshotWrite => "voting.snapshot.write",\n            Self::MarketCreate => "prediction_market.create",\n            Self::MarketSubmitReview => "prediction_market.submit_review",\n            Self::MarketGovern => "prediction_market.govern",\n            Self::MarketPolicyManage => "prediction_market.policy.manage",\n            Self::MarketStake => "prediction_market.stake",\n            Self::MarketIntentRead => "prediction_market.intent.read",\n            Self::MarketIntentWrite => "prediction_market.intent.write",',
              "capability names",
          )

          internal_tail = """    Ok(RequestClass::Deny(Transport::WebInternal))
}

async fn classify_admin("""
          internal_market_block = """    if segments == ["internal", "markets"] && method == &Method::POST {
        let organization_id = required_body_uuid(body, "organization_id")?;
        return Ok(protected_web(
            Capability::MarketCreate,
            ScopeSource::Resolved(Scope::organization(
                organization_id,
                "organization",
                Some(organization_id),
            )),
            None,
        ));
    }

    if segments.len() == 4 && segments[1] == "markets" {
        let market_id = parse_uuid(segments[2])?;
        let organization_id = organization_for_market(pool, market_id).await?;
        let capability = if segments[3] == "policy-decisions" && method == &Method::POST {
            Capability::MarketPolicyManage
        } else if segments[3] == "transitions" && method == &Method::POST {
            if body_string(body, "target_status").as_deref() == Some("pending_review") {
                Capability::MarketSubmitReview
            } else {
                Capability::MarketGovern
            }
        } else if segments[3] == "stake-intents" && method == &Method::POST {
            Capability::MarketStake
        } else {
            return Ok(RequestClass::Deny(Transport::WebInternal));
        };
        return Ok(protected_web(
            capability,
            ScopeSource::Resolved(Scope::organization(
                organization_id,
                "prediction_market",
                Some(market_id),
            )),
            None,
        ));
    }

    if segments.len() >= 3 && segments[1] == "market-intents" {
        let intent_id = parse_uuid(segments[2])?;
        let (organization_id, user_id) = scope_for_market_intent(pool, intent_id).await?;
        let capability = if segments.len() == 3 && method == &Method::GET {
            Capability::MarketIntentRead
        } else if segments.len() == 4
            && segments[3] == "submission"
            && method == &Method::POST
        {
            Capability::MarketIntentWrite
        } else {
            return Ok(RequestClass::Deny(Transport::WebInternal));
        };
        return Ok(protected_web(
            capability,
            ScopeSource::Resolved(Scope::owned(
                organization_id,
                user_id,
                "prediction_market_stake_intent",
                intent_id,
            )),
            None,
        ));
    }

    Ok(RequestClass::Deny(Transport::WebInternal))
}

