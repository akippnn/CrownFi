name: Production manifest smoke

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-manifest-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-manifest:
    name: Production manifest materialization
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Compile materializer
        run: python3 -m py_compile scripts/materialize-production-manifest

      - name: Prove accelerated build contract
        run: |
          set -euo pipefail
          bash -n scripts/arcturus-ci
          python3 - <<'PY'
          from pathlib import Path

          ci = Path('scripts/arcturus-ci').read_text(encoding='utf-8')
          api = Path('services/api/Dockerfile').read_text(encoding='utf-8')
          web = Path('web/Dockerfile').read_text(encoding='utf-8')

          for required in ('--layers', '--cache-from', '--cache-to', '--cache-ttl'):
              assert required in ci, required
          assert 'ARCTURUS_REMOTE_BUILD_CACHE' in ci
          assert 'cargo-chef' in api
          assert 'cargo test --release --locked' in api
          assert '/app/.next/standalone' in web
          assert 'CMD ["node", "server.js"]' in web
          PY

      - name: Prove disabled R2 stays absent
        run: |
          set -euo pipefail
          cp arcturus.release.json /tmp/arcturus.release.base.json
          CROWNFI_R2_ENABLED=false python3 scripts/materialize-production-manifest
          python3 - <<'PY'
          import json
          with open('arcturus.release.json', encoding='utf-8') as stream:
              manifest = json.load(stream)
          api = manifest['spec']['components']['api']
          assert not any(key.startswith('R2_') for key in api.get('environment', {}))
          assert not any(item.get('target', '').startswith('R2_') for item in api.get('secrets', []))
          PY

      - name: Prove enabled R2 is complete and secret-safe
        run: |
          set -euo pipefail
          cp /tmp/arcturus.release.base.json arcturus.release.json
          CROWNFI_R2_ENABLED=true \
          R2_ENDPOINT=https://example-account.r2.cloudflarestorage.com \
          R2_BUCKET=crownfi-test \
          R2_PUBLIC_BASE_URL=https://media.example.test \
          R2_UPLOAD_TTL_SECONDS=300 \
          R2_MAX_IMAGE_BYTES=15728640 \
            python3 scripts/materialize-production-manifest
          python3 - <<'PY'
          import json
          with open('arcturus.release.json', encoding='utf-8') as stream:
              manifest = json.load(stream)
          api = manifest['spec']['components']['api']
          environment = api['environment']
          assert environment['R2_ENDPOINT'] == 'https://example-account.r2.cloudflarestorage.com'
          assert environment['R2_BUCKET'] == 'crownfi-test'
          assert environment['R2_PUBLIC_BASE_URL'] == 'https://media.example.test'
          targets = {item['target']: item['name'] for item in api['secrets']}
          assert targets['R2_ACCESS_KEY_ID'] == 'stellar-r2-access-key-id-20260716'
          assert targets['R2_SECRET_ACCESS_KEY'] == 'stellar-r2-secret-access-key-20260716'
          assert 'example' not in json.dumps(api['secrets'])
          PY
          bash scripts/arcturus-guard

      - name: Reject incomplete R2 configuration
        run: |
          set -euo pipefail
          cp /tmp/arcturus.release.base.json arcturus.release.json
          if CROWNFI_R2_ENABLED=true R2_BUCKET=crownfi-test \
            python3 scripts/materialize-production-manifest; then
            echo 'Incomplete R2 configuration unexpectedly passed.' >&2
            exit 1
          fi
